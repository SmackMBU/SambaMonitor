<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-root-uri" content="__APP_ROOT_URI__" />
    <title>Samba Monitor</title>
    <link rel="stylesheet" href="__APP_ROOT_URI__/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="panel-header">
          <div class="title-block">
            <p class="eyebrow">SMB Monitoring</p>
            <h1>Открытые файлы Samba</h1>
            <p class="subtitle">
              Быстрый просмотр открытых файлов и закрытие зависших клиентских подключений.
            </p>
          </div>
          <button id="refreshButton" class="button" type="button">Обновить данные</button>
        </header>

        <div class="controls">
          <label class="control">
            Поиск по имени или пути
            <input
              id="searchInput"
              type="text"
              placeholder="Введите текст для поиска"
              autocomplete="off"
            />
            <small class="hint">Обычный поиск по подстроке, без масок.</small>
          </label>
          <label class="toggle-control" for="filesOnlyInput">
            <input id="filesOnlyInput" type="checkbox" />
            <span>Скрывать записи без расширения</span>
          </label>
        </div>

        <p id="status" class="status">Загрузка...</p>

        <div id="pagination" class="pagination" hidden>
          <button id="prevPageButton" class="page-button" type="button">Назад</button>
          <span id="pageInfo" class="page-info"></span>
          <button id="nextPageButton" class="page-button" type="button">Вперёд</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-name">Имя файла</th>
                <th class="col-user">Пользователь</th>
                <th class="col-pid">PID</th>
                <th class="col-opened">Открыт</th>
                <th class="col-action">Действие</th>
              </tr>
            </thead>
            <tbody id="filesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="emptyRowTemplate">
      <tr>
        <td colspan="5" class="empty-cell">Открытые файлы не найдены</td>
      </tr>
    </template>

    <script src="__APP_ROOT_URI__/static/script.js"></script>
  </body>
</html>
